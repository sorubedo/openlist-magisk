name: Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest OpenList binaries
        run: bash fetch.sh

      - name: Package module
        run: bash package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlist-runsv
          path: out/*.zip
