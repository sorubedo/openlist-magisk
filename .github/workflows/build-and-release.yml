name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest OpenList binaries
        id: upstream
        run: bash fetch.sh

      - name: Read module version
        id: prep
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package per ABI
        run: bash package.sh

      - name: Create release notes
        env:
          MODULE_VERSION: ${{ steps.prep.outputs.version }}
          OPENLIST_VERSION: ${{ steps.upstream.outputs.openlist_version }}
        run: |
          {
            echo "## Build information"
            echo
            echo "| Component | Version |"
            echo "| --- | --- |"
            echo "| openlist-runsv module | $MODULE_VERSION |"
            echo "| OpenList upstream binary | [$OPENLIST_VERSION](https://github.com/OpenListTeam/OpenList/releases/tag/$OPENLIST_VERSION) |"
            echo
            echo "## ABI packages"
            echo
            echo "| Asset suffix | Android / Magisk architecture |"
            echo "| --- | --- |"
            echo "| arm64-v8a | arm64 |"
            echo "| armeabi-v7a | arm |"
            echo "| x86_64 | x64 |"
            echo "| x86 | x86 |"
            echo
            echo "Each ZIP contains binaries for one ABI only. Download the asset matching the target device."
            echo
            echo "## SHA-256"
            echo
            echo '```text'
            cat out/SHA256SUMS
            echo '```'
          } > out/release-notes.md

          cat out/release-notes.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.prep.outputs.version }}
          name: v${{ steps.prep.outputs.version }} (OpenList ${{ steps.upstream.outputs.openlist_version }})
          body_path: out/release-notes.md
          generate_release_notes: true
          files: |
            out/*.zip
            out/SHA256SUMS
            out/upstream-versions.env
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
